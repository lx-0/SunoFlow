<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.22" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <path d="M 88 312 C 152 244, 220 244, 256 312 S 376 380, 416 312"
          stroke="#ffffff" stroke-opacity="0.28" stroke-width="22"
          fill="none" stroke-linecap="round"/>

    <path d="M 88 256 C 152 132, 220 132, 256 256 S 376 380, 416 256"
          stroke="url(#wave)" stroke-width="40"
          fill="none" stroke-linecap="round"/>

    <circle cx="416" cy="256" r="38" fill="#ffffff" opacity="0.18"/>
    <circle cx="416" cy="256" r="24" fill="#ffffff"/>
  </g>
</svg>
