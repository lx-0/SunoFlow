# SunoFlow native — create a playlist (write path on the test account).
#
# ⚠️ Selector caveat: the create control is an UNLABELED "+" icon in the header
# (no testID, no accessibilityLabel), which Maestro cannot target reliably. This
# flow therefore uses the EMPTY-STATE CTA "New playlist", so run it on an account
# whose Playlists tab is empty (or delete playlists first). For a non-empty list,
# add `testID="create-playlist"` (or an accessibilityLabel) to the header Plus in
# app/(tabs)/playlists.tsx — then this flow can tap it by id in any state.
#
# The playlist name is entered via a native Alert.prompt ("New Playlist").
appId: app.sunoflow.mobile
env:
  EMAIL: ""
  PASSWORD: ""
  PLAYLIST_NAME: "Maestro Smoke Playlist"
---
- launchApp
- runFlow:
    when:
      visible: "Sign in"
    commands:
      - tapOn: "Email"
      - inputText: ${EMAIL}
      - tapOn: "Password"
      - inputText: ${PASSWORD}
      - tapOn: "Sign in"

- tapOn: "Playlists"            # bottom-tab label
- assertVisible: "New playlist" # empty-state CTA (see caveat above)
- tapOn: "New playlist"

# Native Alert.prompt: the text field auto-focuses, then confirm with OK.
- assertVisible: "New Playlist"
- inputText: ${PLAYLIST_NAME}
- tapOn: "OK"

# New playlist appears in the list.
- extendedWaitUntil:
    visible: ${PLAYLIST_NAME}
    timeout: 15000
