# SunoFlow native — create a playlist (write path on the test account).
#
# Targets the header create button by `testID: create-playlist` (added to
# app/(tabs)/playlists.tsx), so this works in ANY state (empty or populated list).
# The playlist name is entered via a native Alert.prompt ("New Playlist").
appId: app.sunoflow.mobile
env:
  EMAIL: ""
  PASSWORD: ""
  PLAYLIST_NAME: "Maestro Smoke Playlist"
---
- launchApp
- runFlow:
    when:
      visible: "Sign in"
    commands:
      - tapOn: "Email"
      - inputText: ${EMAIL}
      - tapOn: "Password"
      - inputText: ${PASSWORD}
      - tapOn: "Sign in"

- tapOn: "Playlists"               # bottom-tab label
- tapOn:
    id: "create-playlist"          # header "+" (testID)

# Native Alert.prompt: the text field auto-focuses, then confirm with OK.
- assertVisible: "New Playlist"
- inputText: ${PLAYLIST_NAME}
- tapOn: "OK"

# New playlist appears in the list.
- extendedWaitUntil:
    visible: ${PLAYLIST_NAME}
    timeout: 15000
