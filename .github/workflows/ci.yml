name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    name: QA Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: projects
          POSTGRES_PASSWORD: projects
          POSTGRES_DB: sunoflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projects"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUNOFLOW_DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      AUTH_SECRET: ci-test-secret-not-for-production
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Push schema to test DB
        run: pnpm exec prisma db push --skip-generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Railway
    needs: [qa, secrets-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --detach --service SunoFlow
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
