name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    name: QA Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: projects
          POSTGRES_PASSWORD: projects
          POSTGRES_DB: sunoflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projects -d sunoflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUNOFLOW_DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      AUTH_SECRET: ci-test-secret-not-for-production
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply DB migrations
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Build without standalone output so `next start` works for E2E.
          # next.config.mjs sets output: undefined when PLAYWRIGHT_TEST=true.
          # The Lighthouse job builds its own standalone artifact separately.
          PLAYWRIGHT_TEST: "true"

      - name: Restore bundle size baseline
        id: restore-bundle-baseline
        uses: actions/cache/restore@v4
        with:
          path: bundle-size-baseline.json
          key: bundle-size-baseline-${{ github.sha }}
          restore-keys: bundle-size-baseline-

      - name: Measure and check bundle sizes
        run: node scripts/bundle-size.mjs --baseline bundle-size-baseline.json --output bundle-size-report.json

      - name: Save bundle size baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cp bundle-size-report.json bundle-size-baseline.json

      - name: Cache bundle size baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: bundle-size-baseline.json
          key: bundle-size-baseline-${{ github.sha }}

      - name: Upload bundle size report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-size-report
          path: bundle-size-report.json
          retention-days: 30

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
        env:
          AUTH_URL: http://127.0.0.1:3200
          PLAYWRIGHT_TEST: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [qa]
    # Lighthouse is a performance metric, not a correctness gate.
    # Allow it to fail without blocking PR merges.
    continue-on-error: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: projects
          POSTGRES_PASSWORD: projects
          POSTGRES_DB: sunoflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projects -d sunoflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUNOFLOW_DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      AUTH_SECRET: ci-test-secret-not-for-production
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "1"
      PORT: "3000"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply DB migrations
        run: pnpm exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Start Next.js server
        run: |
          # Bind to 127.0.0.1 so both curl and Chromium use IPv4 (some CI
          # runners resolve "localhost" to ::1 while Chrome uses 127.0.0.1).
          HOSTNAME=127.0.0.1 node .next/standalone/server.js &
          # Poll until the server is ready (up to 60s)
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000 && break || sleep 1
          done

      - name: Run Lighthouse CI
        # lhci autorun exits non-zero when scores fail assertions or when Chrome
        # can't load the page (CHROME_INTERSTITIAL_ERROR in headless CI).
        # Lighthouse is a quality metric, not a correctness gate — treat failures
        # as informational so they don't block PR merges.
        run: lhci autorun || echo "Lighthouse CI failed (non-blocking)"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
