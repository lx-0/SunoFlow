name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    name: QA Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: projects
          POSTGRES_PASSWORD: projects
          POSTGRES_DB: sunoflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projects -d sunoflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUNOFLOW_DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      AUTH_SECRET: ci-test-secret-not-for-production
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply DB migrations
        run: pnpm exec prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
        env:
          AUTH_URL: http://localhost:3200
          PLAYWRIGHT_TEST: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [qa]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: projects
          POSTGRES_PASSWORD: projects
          POSTGRES_DB: sunoflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projects -d sunoflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUNOFLOW_DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      DATABASE_URL: postgres://projects:projects@localhost:5432/sunoflow
      AUTH_SECRET: ci-test-secret-not-for-production
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "1"
      PORT: "3000"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply DB migrations
        run: pnpm exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Start Next.js server
        run: |
          node .next/standalone/server.js &
          # Poll until the server is ready (up to 60s)
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 && break || sleep 1
          done

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-staging:
    name: Deploy to Staging
    needs: [qa, secrets-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to staging
        run: railway up --detach --service SunoFlow-staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

      - name: Write deploy summary
        run: |
          echo "## Staging Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: SunoFlow-staging" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ vars.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY

  e2e-staging:
    name: E2E Tests (Staging)
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests against staging
        run: pnpm test:e2e
        env:
          BASE_URL: ${{ vars.STAGING_URL }}
          PLAYWRIGHT_REMOTE: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 14

      - name: Write E2E summary
        if: always()
        run: |
          echo "## Staging E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ vars.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
