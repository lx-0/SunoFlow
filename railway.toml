[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volumes for audio + image cache.
# Configured in Railway dashboard: Settings → Volumes.
#   Volume 1 → Mount Path: /data/audio-cache  (set AUDIO_CACHE_DIR=/data/audio-cache)
#   Volume 2 → Mount Path: /data/image-cache   (set IMAGE_CACHE_DIR=/data/image-cache)
# This ensures cached files survive redeployments.
