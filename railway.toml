[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume for audio cache.
# Configured in Railway dashboard: Settings → Volumes → Mount Path: /data/audio-cache
# Set AUDIO_CACHE_DIR=/data/audio-cache in Railway environment variables.
# This ensures cached audio files survive redeployments.
