# Monorepo workspace. The Next.js web app stays at the repo root (keeps the
# finely-tuned Dockerfile + Railway deploy untouched); shared, framework-agnostic
# TypeScript lives in packages/*. The Expo app (apps/mobile) is intentionally NOT
# a workspace member so its React Native / Expo dependency tree never enters the
# server lockfile or the production Docker image.
packages:
  - "packages/*"

# pnpm 10+ reads build-approval, dependency overrides, and audit config from THIS
# file — it IGNORES the package.json "pnpm" field (with a warning). CI still runs
# pnpm 9 via the `packageManager` pin and reads the package.json copy, so the two
# are kept in sync until the toolchain is unified on one pnpm major. Keep both
# lists identical when editing.
onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/client"
  - "@prisma/engines"
  - "@scarf/scarf"
  - "@sentry/cli"
  - "@swc/core"
  - "@tree-sitter-grammars/tree-sitter-yaml"
  - "core-js"
  - "core-js-pure"
  - "esbuild"
  - "msgpackr-extract"
  - "prisma"
  - "protobufjs"
  - "sharp"
  - "tree-sitter"
  - "tree-sitter-json"
  - "unrs-resolver"

overrides:
  picomatch: ">=4.0.4"
  "brace-expansion@5": ">=5.0.7"
  "brace-expansion@<2": ">=1.1.16 <2"
  "brace-expansion@>=2 <3": ">=2.1.2 <3"
  lodash: ">=4.18.0"
  axios: ">=1.18.0"
  "protobufjs@7": ">=7.6.3 <8"
  hono: ">=4.12.25"
  "ws@7": ">=7.5.11 <8"
  "form-data@4": ">=4.0.6"
  "@hono/node-server": ">=1.19.13"
  follow-redirects: ">=1.16.0"
  dompurify: ">=3.4.0"
  fast-uri: ">=3.1.4"
  "js-yaml@4": ">=4.3.0"
  sharp: ">=0.35.0"
  postcss: ">=8.5.10"
  icu-minify: ">=4.9.2"
  ip-address: ">=10.1.1"

auditConfig:
  # immutable 3.x sits under swagger-ui-react (docs page only); the patched
  # line is 4.3.9+ — a major bump swagger-ui-react does not support.
  ignoreGhsas:
    - GHSA-v56q-mh7h-f735
    - GHSA-xvcm-6775-5m9r
